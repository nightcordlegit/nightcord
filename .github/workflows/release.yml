name: Build & Release YouCord

on:
  push:
    tags:
      - "v*"          # dÃ©clenchÃ© sur : git tag v1.0.0 && git push --tags

permissions:
  contents: write    # nÃ©cessaire pour crÃ©er la GitHub Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Equicord renderer (standalone)
        run: pnpm buildStandalone

      - name: Build & Package Electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node electron-builder.config.cjs || true
          npx electron-builder --config electron-builder.config.cjs --win --publish always

      - name: Package youcord-dist.zip
        shell: pwsh
        run: |
          # youcord-dist.zip â€” structure attendue par l'installeur (Program.cs EnsureDistAsync) :
          # la racine du zip = _distDir (%LOCALAPPDATA%\YouCord\dist\)
          # => patcher.js DOIT Ãªtre Ã  la racine, pas dans un sous-dossier dist\desktop\
          $staging = "youcord-dist-staging"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null

          # Fichiers JS compilÃ©s : on copie le CONTENU de dist\desktop\ Ã  la racine du staging
          # (patcher.js, renderer.js, preload.js, etc. directement accessibles)
          if (Test-Path "dist\desktop") {
            Copy-Item "dist\desktop\*" "$staging\" -Recurse -Force
          } elseif (Test-Path "dist") {
            # Fallback : ancienne structure
            Copy-Item "dist\*" "$staging\" -Recurse -Force
          }

          # Ghost-server (voice/stream server)
          if (Test-Path "ghost-server") {
            Copy-Item "ghost-server" "$staging\ghost-server" -Recurse
          }

          # Static assets from release/youcord-dist (ffmpeg.dll, modules, mac/, multi-instance-icons/, etc.)
          if (Test-Path "release\youcord-dist") {
            Copy-Item "release\youcord-dist\*" "$staging\" -Recurse -Force
          }

          # Entry-point files
          foreach ($f in @("youcord-index.js", "youcord-preload.js")) {
            if (Test-Path $f) { Copy-Item $f "$staging\" }
          }

          # Sanity-check : patcher.js doit Ãªtre Ã  la racine
          if (-not (Test-Path "$staging\patcher.js")) {
            Write-Error "BUILD ERROR: patcher.js absent de la racine du staging â€” l'installeur ne pourra pas fonctionner."
            exit 1
          }

          Compress-Archive -Path "$staging\*" -DestinationPath "youcord-dist.zip" -Force
          Write-Host "youcord-dist.zip created ($($(Get-Item youcord-dist.zip).Length / 1MB) MB)"

      - name: Upload youcord-dist.zip to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            youcord-dist.zip
            dist/desktop.asar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
